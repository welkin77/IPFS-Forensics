{% extends "base.html" %}
{% block title %}历史案件{% endblock %}

{% block content %}
<!-- 统计图表 -->
<div class="row g-3 mb-4">
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <div id="pie-chart" style="height: 250px;"></div>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <h6><i class="bi bi-info-circle me-1"></i>案件概况</h6>
                <p class="mb-1">总取证记录: <strong>{{ total_count }}</strong></p>
                <p class="mb-1">涉嫌违法: <strong class="text-danger">{{ illegal_count }}</strong></p>
                <p class="mb-0">正常文件: <strong class="text-success">{{ legal_count }}</strong></p>
            </div>
        </div>
    </div>
</div>

<!-- 历史记录表 -->
<div class="card">
    <div class="card-header d-flex justify-content-between">
        <span><i class="bi bi-archive me-1"></i>历史取证记录</span>
        <button class="btn btn-sm btn-outline-primary"
                hx-get="/api/history" hx-target="#history-body" hx-swap="innerHTML">
            <i class="bi bi-arrow-clockwise me-1"></i>刷新
        </button>
    </div>
    <div class="card-body p-0">
        <table class="table table-sm table-hover table-striped mb-0">
            <thead class="table-light">
                <tr>
                    <th>案件号</th>
                    <th>CID</th>
                    <th>类型</th>
                    <th>大小</th>
                    <th>状态</th>
                    <th>时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="history-body">
                {% include 'partials/history_table.html' %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// 饼图
var pie = echarts.init(document.getElementById('pie-chart'));
pie.setOption({
    title: { text: '取证结果分布', left: 'center', textStyle: { fontSize: 14 } },
    tooltip: { trigger: 'item' },
    series: [{
        type: 'pie', radius: '65%',
        data: [
            { value: {{ illegal_count }}, name: '涉嫌违法', itemStyle: { color: '#dc3545' } },
            { value: {{ legal_count }}, name: '正常', itemStyle: { color: '#198754' } }
        ]
    }]
});
window.addEventListener('resize', () => pie.resize());
</script>
{% endblock %}
