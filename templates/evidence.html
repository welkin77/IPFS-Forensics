{% extends "base.html" %}
{% block title %}证据固定{% endblock %}

{% block content %}
<div class="row g-3">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-file-earmark-lock me-1"></i>创建取证任务
            </div>
            <div class="card-body">
                <form hx-post="/api/collect"
                      hx-target="#evidence-result"
                      hx-swap="innerHTML"
                      hx-indicator="#collect-spinner">

                    <div class="input-group mb-3">
                        <span class="input-group-text">ipfs://</span>
                        <input type="text" name="cid" class="form-control"
                               placeholder="输入可疑的 IPFS CID"
                               value="{{ target_cid }}" required>
                    </div>

                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label small text-muted">案件编号（留空自动生成）</label>
                            <input type="text" name="case_id" class="form-control"
                                   placeholder="CASE-2026-0319-001">
                        </div>
                        <div class="col">
                            <label class="form-label small text-muted">取证人员</label>
                            <input type="text" name="investigator_id" class="form-control"
                                   value="Police_001">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <span id="collect-spinner" class="htmx-indicator">
                            <span class="spinner-border spinner-border-sm me-1"></span>
                        </span>
                        <i class="bi bi-lock me-1"></i>启动取证固化
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- 取证结果（HTMX动态填充） -->
<div id="evidence-result" class="mt-4"></div>
{% endblock %}
